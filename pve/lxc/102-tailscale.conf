# CT 102: Tailscale VPN
arch: amd64
cores: 1
features: nesting=1
hostname: tailscale
memory: 256
nameserver: 1.1.1.1
net0: name=eth0,bridge=vmbr1,gw=10.10.10.1,ip=10.10.10.5/24,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-102-disk-0,size=2G
swap: 256
unprivileged: 1
# Required for Tailscale TUN device
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
