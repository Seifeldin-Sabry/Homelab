# VM 100: Docker Host
# Debian/Ubuntu with cloud-init, Docker pre-installed
agent: enabled=1
balloon: 16384
bios: ovmf
boot: order=scsi0
citype: nocloud
ciuser: admin
cores: 10
cpu: host
efidisk0: local-lvm:vm-100-disk-0,efitype=4m,pre-enrolled-keys=0,size=4M
ide2: local-lvm:vm-100-cloudinit,media=cdrom
ipconfig0: ip=192.168.129.10/23,gw=192.168.128.1
machine: q35
memory: 26624
name: docker-host
nameserver: 1.1.1.1
net0: virtio=BC:24:11:19:F4:FD,bridge=vmbr0
onboot: 1
ostype: l26
scsi0: local-lvm:vm-100-disk-1,discard=on,iothread=1,size=120G,ssd=1
# USB HDD passthrough for media storage
scsi2: /dev/disk/by-id/usb-ST4000DM_004-2U9104_00000000006E-0:0,size=3907018584K
scsihw: virtio-scsi-single
